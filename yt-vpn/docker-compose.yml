services:
  nordvpn:
    image: ghcr.io/bubuntux/nordlynx
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TOKEN=${NORDVPN_TOKEN}
      - PRIVATE_KEY=${NORDVPN_PRIVATE_KEY}
      - COUNTRY_CODE=cy
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped

  debian-yt-dlp:
    image: debian:bookworm-slim
    depends_on:
      - nordvpn
    network_mode: service:nordvpn
    working_dir: /data
    volumes:
      - /mnt/enc-camelot/yt:/data:rw
    restart: unless-stopped
    command: >
      bash -c "
      apt-get update && apt-get install -y python3-pip ca-certificates curl ffmpeg &&
      pip3 install yt-dlp --break-system-packages &&
      tail -f /dev/null
      "