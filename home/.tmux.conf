# Improved terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Key prefix: keep Ctrl-b as default but reduce prefix delay for snappier feel.
set -sg prefix2 C-a
bind -T prefix C-a send-prefix -2
set -g prefix-timeout 500

# Mouse on (scroll, click to focus pane, drag to resize)
set -g mouse on

# Pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39
set -g pane-border-lines heavy

# Window status
set -g window-status-format "#[fg=colour244,bg=colour234] #I │ #W "
set -g window-status-current-format "#[fg=colour39,bg=colour234] #I │ #W "
set -g status-interval 5

# Status line: simple, two lines
set -g status-position top
set -g status-justify left
set -g status-left-length 30
set -g status-left "#[fg=colour39,bg=colour234] #S #[fg=colour234,bg=colour240] │"
set -g status-right "#[fg=colour240] #{?window_flags,#[fg=colour39]#{window_flags},} %Y-%m-%d %H:%M "
set -g status-style "bg=colour234,fg=colour244"

# Reload config with `prefix r`
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Sane scrollback
set -g history-limit 10000

# Don't rename windows automatically
set -g allow-rename off

# New windows / panes inherit working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel