name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: bash -n syntax check
        run: |
          set -e
          find scripts lib -name '*.sh' -print0 | xargs -0 -n1 bash -n
          bash -n bootstrap.sh
          bash -n install-home.sh

      - name: shellcheck
        run: |
          set -e
          shellcheck bootstrap.sh install-home.sh
          shellcheck scripts/**/*.sh lib/*.sh